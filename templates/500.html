{% extends "base.html" %}
{% block title %}500 — Server Error{% endblock %}

{% block content %}
<div style="text-align:center; padding:5rem 1rem;">
  <div style="font-family:'Syne',sans-serif; font-size:6rem; font-weight:800; color:var(--border); line-height:1;">500</div>
  <h2 style="font-family:'Syne',sans-serif; font-size:1.5rem; margin:1rem 0 0.5rem;">Server Error</h2>
  <p style="color:var(--muted); margin-bottom:2rem;">Something went wrong on our end. Please try again.</p>
  <a href="{{ url_for('index') }}" class="btn btn-primary">Go Home</a>
</div>
{% endblock %}
