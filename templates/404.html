{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}

{% block content %}
<div style="text-align:center; padding:5rem 1rem;">
  <div style="font-family:'Syne',sans-serif; font-size:6rem; font-weight:800; color:var(--border); line-height:1;">404</div>
  <h2 style="font-family:'Syne',sans-serif; font-size:1.5rem; margin:1rem 0 0.5rem;">Page Not Found</h2>
  <p style="color:var(--muted); margin-bottom:2rem;">The page you're looking for doesn't exist or was moved.</p>
  <a href="{{ url_for('index') }}" class="btn btn-primary">Go Home</a>
</div>
{% endblock %}
