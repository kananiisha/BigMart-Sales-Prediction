{% extends "base.html" %}
{% block title %}Login — BigMart{% endblock %}

{% block extra_css %}
<style>
  body { background: radial-gradient(ellipse at 60% 0%, #0d2a1f 0%, var(--bg) 60%); }
  .auth-wrap {
    min-height: calc(100vh - 130px);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .auth-box {
    width: 100%;
    max-width: 420px;
    animation: fadeUp 0.5s ease;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .auth-logo {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    color: var(--accent);
    text-align: center;
    margin-bottom: 0.3rem;
  }
  .auth-logo span { color: var(--text); }
  .auth-subtitle { text-align: center; color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
  .auth-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
  }
  .auth-card h2 { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 700; margin-bottom: 1.5rem; }
  .auth-footer { text-align: center; margin-top: 1.25rem; color: var(--muted); font-size: 0.88rem; }
  .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; }
  .divider::before, .divider::after { content:''; flex:1; height:1px; background: var(--border); }
  .divider span { color: var(--muted); font-size: 0.8rem; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">Big<span>Mart</span></div>
    <p class="auth-subtitle">Sales Prediction Platform</p>

    <div class="auth-card">
      <h2>Welcome back 👋</h2>

      <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
      </form>

      <div class="divider"><span>or</span></div>

      <div class="auth-footer">
        Don't have an account? <a href="{{ url_for('signup') }}">Sign up free</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
