{% extends "base.html" %}
{% block title %}Sign Up — BigMart{% endblock %}

{% block extra_css %}
<style>
  body { background: radial-gradient(ellipse at 40% 0%, #0d2a1f 0%, var(--bg) 60%); }
  .auth-wrap {
    min-height: calc(100vh - 130px);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .auth-box { width: 100%; max-width: 440px; animation: fadeUp 0.5s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .auth-logo { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; color: var(--accent); text-align: center; margin-bottom: 0.3rem; }
  .auth-logo span { color: var(--text); }
  .auth-subtitle { text-align: center; color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
  .auth-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; }
  .auth-card h2 { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 700; margin-bottom: 1.5rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .auth-footer { text-align: center; margin-top: 1.25rem; color: var(--muted); font-size: 0.88rem; }
  .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .hint { font-size: 0.78rem; color: var(--muted); margin-top: 0.3rem; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">Big<span>Mart</span></div>
    <p class="auth-subtitle">Create your free account</p>

    <div class="auth-card">
      <h2>Get started 🚀</h2>

      <form method="POST" action="{{ url_for('signup') }}">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" name="name" class="form-control" placeholder="Your name" required />
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" minlength="6" required />
            <p class="hint">Min 6 characters</p>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input type="password" name="confirm_password" class="form-control" placeholder="••••••••" required />
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Create Account</button>
      </form>

      <div class="auth-footer" style="margin-top:1rem;">
        Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
